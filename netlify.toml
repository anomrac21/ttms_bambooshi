[build]
  publish = "public"
  command = "bash build_menu.sh"

[build.environment]
  # Match local/cluster Hugo (0.121.x fails on current hugo.toml + theme; needs Goldmark attributes, module mounts)
  HUGO_VERSION = "0.140.2"
  HUGO_ENV = "production"
  GIT_SUBMODULE_STRATEGY = "recursive"
  # Disable SSH prompts
  GIT_TERMINAL_PROMPT = "0"

[context.production.environment]
  GIT_SUBMODULE_STRATEGY = "recursive"
  GIT_TERMINAL_PROMPT = "0"

[[redirects]]
  from = "/*"
  to = "/404/"
  status = 404
